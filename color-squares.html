input[type=range] {
  background:none;
  height: 2em;
  -webkit-appearance: none;
  margin: 10px 0;
  width: 10em;
}
input[type=range]:focus {
  outline: none;
}
input[type=range]::-webkit-slider-runnable-track {
  width: 100%;
  height: 1em;
  cursor: pointer;
  animate: 0.2s;
  box-shadow: 0px 0px 0px #50555C;
  background: #9BA5B3;
  border-radius: 1em;
  border: 0px solid #000000;
}
input[type=range]::-webkit-slider-thumb {
  box-shadow: 0px 0px 0px #000000;
  border: 0px solid #000000;
  height: 1.25em;
  width: 2.5em;
  border-radius: .75em;
  background: #529DE1;
  cursor: pointer;
  -webkit-appearance: none;
  margin-top: -.125em;
}
input[type=range]:focus::-webkit-slider-runnable-track {
  background: #9BA5B3;
}
input[type=range]::-moz-range-track {
  width: 100%;
  height: 1em;
  cursor: pointer;
  animate: 0.2s;
  box-shadow: 0px 0px 0px #50555C;
  background: #9BA5B3;
  border-radius: 14px;
  border: 0px solid #000000;
}
input[type=range]::-moz-range-thumb {

  border: 0px solid #000000;
  height: 1.25em;
  width: 2.5em;
  border-radius: .75em;
  background: #529DE1;
  cursor: pointer;
}
input[type=range]::-ms-track {
  width: 100%;
  height: 14px;
  cursor: pointer;
  animate: 0.2s;
  background: transparent;
  border-color: transparent;
  color: transparent;
}
input[type=range]::-ms-fill-lower {

input[type=range]::-ms-fill-upper {

<script>
	$(document).ready(function() {
		var hue = 0;
		setInterval(function() {
			hue = hue + 1;
			$('.color_box').each(function() {
				
				$(this).css('filter','hue-rotate('+hue+'deg)');
			});
			
		}, 64);
		

	});
  
  function changeSpeed(speedNum) {
    var boxArr = $('.color_bg');
    var aniFast = '.75s';
    var aniNorm = '1.5s';
    var aniSlow = '2.25s';
    if (speedNum == 2) {
      $('#speedLabel').html("Fast Speed");
       for (i = 0; i < boxArr.length; i++) {
        var currIndex = boxArr[i];
        $(currIndex).css('animation-duration', aniFast);
      }
    }
    if (speedNum == 1) {
      $('#speedLabel').html("Normal Speed");
      for (i = 0; i < boxArr.length; i++) {
        var currIndex = boxArr[i];
        $(currIndex).css('animation-duration', aniNorm);
      }
    }
    if (speedNum == 0) {
      $('#speedLabel').html("Slow Speed");
      for (i = 0; i < boxArr.length; i++) {
        var currIndex = boxArr[i];
        $(currIndex).css('animation-duration', aniSlow);
      }
    }
   
    console.log(speedNum + ", " + $('#box02').css('animation-duration'));
  }
	
	
</script>
